spring:
  application:
    name: bank-account-service

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 2000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

customer-service:
  base-url: ${CUSTOMER_SERVICE_URL}

server:
  port: 8080

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5m
        permitted-calls-in-half-open-state: 3
        sliding-window-size: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
